[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    unit: unit tests (no I/O, no network)
    integration: integration tests (with I/O or external calls)
    asyncio: async tests requiring pytest-asyncio
asyncio_mode = auto
